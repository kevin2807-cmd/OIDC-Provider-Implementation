<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OIDC Python Client</title>
    <style>
        body { font-family: sans-serif; padding: 40px; text-align: center; }
        .btn { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; text-decoration: none;}
    </style>
</head>
<body>
    <h1>OIDC Testing Application</h1>
    
    {% if user %}
        <p>You are already logged in!</p>
        <a href="/profile" class="btn">View Profile</a>
    {% else %}
        <p>You are currently not authenticated.</p>
        <!-- Requirement A: The Login Button -->
        <a href="/login" class="btn">Login with OIDC</a>
    {% endif %}
</body>
</html>
