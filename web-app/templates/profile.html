<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Profile</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 40px;
      }
      .profile-card {
        border: 1px solid #ccc;
        padding: 20px;
        border-radius: 5px;
        max-width: 600px;
      }
      pre {
        background: #eee;
        padding: 15px;
        border-radius: 5px;
        overflow-x: auto;
      }
      .btn {
        padding: 8px 15px;
        background: #dc3545;
        color: white;
        text-decoration: none;
        border-radius: 5px;
      }
      textarea {
        width: 100%; /* Memenuhi lebar container */
        box-sizing: border-box; /* Agar padding tidak menambah lebar */
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #f8f9fa;
        font-family:
          "Courier New", Courier, monospace; /* Font khusus kode/token */
        font-size: 14px;
        color: #333;
        resize: vertical; /* Hanya bisa diperbesar ke bawah, tidak ke samping */
        word-break: break-all; /* Memaksa string JWT yang panjang untuk turun ke baris baru */
        line-height: 1.5;
      }

      /* Efek saat textarea diklik */
      textarea:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="profile-card">
      <h2>Profile Page</h2>

      <!-- Requirement C: Display the user's information extracted from the JWT -->
      <p><strong>Subject (ID):</strong> {{ user.sub }}</p>
      <p>
        <strong>Username/Name:</strong> {{ user.preferred_username or user.name
        or 'N/A' }}
      </p>
      <p><strong>Email:</strong> {{ user.email or 'N/A' }}</p>

      <h3>Parsed ID Token Payload:</h3>
      <pre><code>{{ raw_json }}</code></pre>

      <h3>Access Token</h3>
      <textarea rows="20" cols="80">{{ raw_access_token }}</textarea>

      <br />
      <br />
      <a href="/logout" class="btn">Log Out</a>
    </div>
  </body>
</html>
